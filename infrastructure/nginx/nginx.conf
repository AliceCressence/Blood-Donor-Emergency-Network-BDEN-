upstream auth_service {
    server auth-service:8001;
}

upstream donor_service {
    server donor-service:8002;
}

upstream request_service {
    server request-service:8003;
}

upstream campaign_service {
    server campaign-service:8004;
}

upstream notification_service {
    server notification-service:8005;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location = / {
        default_type application/json;
        return 200 '{"service":"BDEN API Gateway","status":"ok","docs":"/api/docs/swagger/","health":{"auth":"/health/auth/","donor":"/health/donor/","request":"/health/request/","campaign":"/health/campaign/","notification":"/health/notification/"}}';
    }

    location /api/donor/docs/ {
        proxy_pass http://donor_service/api/docs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/donor/redoc/ {
        proxy_pass http://donor_service/api/redoc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/docs/ {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/schema.json {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/ {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /django-admin/auth/ {
        proxy_pass http://auth_service/django-admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /django-admin/donor/ {
        proxy_pass http://donor_service/django-admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/donors/ {
        proxy_pass http://donor_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/estimation/ {
        proxy_pass http://donor_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/requests/ {
        proxy_pass http://request_service;
        proxy_set_header Host $host;
    }

    location /api/campaigns/ {
        proxy_pass http://campaign_service;
        proxy_set_header Host $host;
    }

    location /api/notifications/ {
        proxy_pass http://notification_service;
        proxy_set_header Host $host;
    }

    location /health/auth/ {
        proxy_pass http://auth_service/health/;
    }

    location /health/donor/ {
        proxy_pass http://donor_service/health/;
    }

    location /health/request/ {
        proxy_pass http://request_service/health/;
    }

    location /health/campaign/ {
        proxy_pass http://campaign_service/health/;
    }

    location /health/notification/ {
        proxy_pass http://notification_service/health/;
    }
}
