version: '3.8'

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: bden_postgres
    restart: always
    environment:
      POSTGRES_USER: bden_user
      POSTGRES_PASSWORD: bden1234
      POSTGRES_DB: bden_auth
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - bden_network

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bden_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - bden_network

volumes:
  postgres_data:
  redis_data:

networks:
  bden_network:
    driver: bridge